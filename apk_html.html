<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
	<title>应用中心 · APK下载 & HTML浏览</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			background: linear-gradient(145deg, #0b1120 0%, #111827 100%);
			font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Microsoft YaHei', sans-serif;
			color: #eef2ff;
			padding: 2rem 1.5rem;
			min-height: 100vh;
		}

		/* 主容器 */
		.container {
			max-width: 1400px;
			margin: 0 auto;
		}

		/* 头部 */
		.hero {
			text-align: center;
			margin-bottom: 3rem;
		}
		.hero h1 {
			font-size: 2.5rem;
			font-weight: 700;
			background: linear-gradient(135deg, #FFB347, #FF6B6B, #A855F7);
			background-clip: text;
			-webkit-background-clip: text;
			color: transparent;
			letter-spacing: -0.3px;
			display: inline-flex;
			align-items: center;
			gap: 12px;
		}
		.hero h1::before {
			content: "📦";
			font-size: 2.2rem;
			background: none;
			color: #FFB347;
		}
		.hero h1::after {
			content: "🌐";
			font-size: 2.2rem;
			background: none;
			color: #A855F7;
		}
		.hero p {
			margin-top: 0.8rem;
			color: #9ca3af;
			font-size: 1.05rem;
			border-bottom: 1px dashed #2d3a5e;
			display: inline-block;
			padding-bottom: 6px;
		}

		/* 刷新按钮 */
		.refresh-bar {
			display: flex;
			justify-content: flex-end;
			margin-bottom: 2rem;
		}
		.refresh-btn {
			background: rgba(255,255,255,0.05);
			backdrop-filter: blur(8px);
			border: 1px solid #3b4b6e;
			border-radius: 60px;
			padding: 8px 22px;
			color: #cbd5e6;
			font-weight: 500;
			font-size: 0.9rem;
			cursor: pointer;
			transition: all 0.2s;
			display: flex;
			align-items: center;
			gap: 8px;
		}
		.refresh-btn:hover {
			background: #2d3a5e;
			color: white;
			border-color: #a78bfa;
			transform: scale(0.97);
		}
		.refresh-btn:active {
			transform: scale(0.95);
		}

		/* 双栏布局 */
		.dashboard {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
			gap: 2rem;
		}

		/* 卡片通用样式 */
		.card {
			background: rgba(18, 25, 45, 0.7);
			backdrop-filter: blur(12px);
			border-radius: 2rem;
			border: 1px solid rgba(100, 130, 200, 0.25);
			overflow: hidden;
			transition: transform 0.2s ease, box-shadow 0.2s;
			box-shadow: 0 20px 35px -12px rgba(0,0,0,0.4);
		}
		.card:hover {
			transform: translateY(-4px);
			border-color: rgba(168, 85, 247, 0.5);
			box-shadow: 0 25px 40px -12px #a855f730;
		}

		.card-header {
			padding: 1.3rem 1.7rem;
			border-bottom: 1px solid #2d3a5e;
			background: rgba(0,0,0,0.25);
		}
		.card-header h2 {
			font-size: 1.7rem;
			font-weight: 600;
			display: flex;
			align-items: center;
			gap: 12px;
		}
		.badge-count {
			background: #1f2a48;
			border-radius: 40px;
			padding: 4px 12px;
			font-size: 0.8rem;
			font-weight: 500;
			color: #b9c7ff;
		}

		.file-list {
			padding: 1rem 1.2rem 1.8rem;
			max-height: 65vh;
			overflow-y: auto;
		}

		/* 单个条目 */
		.file-item {
			display: flex;
			align-items: center;
			justify-content: space-between;
			flex-wrap: wrap;
			gap: 12px;
			background: rgba(0,0,0,0.3);
			margin-bottom: 12px;
			padding: 12px 18px;
			border-radius: 1.2rem;
			transition: all 0.2s;
			border: 1px solid transparent;
		}
		.file-item:hover {
			background: #1e2a44;
			border-color: #5b6e9e;
		}

		.file-info {
			display: flex;
			align-items: center;
			gap: 14px;
			flex: 2;
			min-width: 160px;
		}
		.file-icon {
			font-size: 1.8rem;
			width: 40px;
			text-align: center;
		}
		.file-details {
			overflow: hidden;
		}
		.file-name {
			font-weight: 600;
			font-size: 1rem;
			word-break: break-all;
		}
		.file-size {
			font-size: 0.7rem;
			color: #8f9bb5;
			margin-top: 4px;
		}

		.action-buttons {
			display: flex;
			gap: 12px;
			flex-wrap: wrap;
		}
		.btn {
			border: none;
			padding: 8px 20px;
			border-radius: 2rem;
			font-weight: 600;
			font-size: 0.8rem;
			cursor: pointer;
			transition: 0.15s;
			text-decoration: none;
			display: inline-flex;
			align-items: center;
			gap: 8px;
			background: rgba(255,255,255,0.1);
			color: #e2e8ff;
		}
		.btn-download {
			background: linear-gradient(110deg, #3b82f6, #9333ea);
			color: white;
			border: none;
			box-shadow: 0 2px 6px rgba(0,0,0,0.2);
		}
		.btn-download:hover {
			transform: scale(1.02);
			filter: brightness(1.05);
			box-shadow: 0 5px 12px #3b82f680;
		}
		.btn-view {
			background: #2b3b5c;
			border: 1px solid #5a72a0;
		}
		.btn-view:hover {
			background: #3e5a88;
			color: white;
		}
		.btn-copy {
			background: #1f293d;
			border: 1px solid #64748b;
		}
		.btn-copy:hover {
			background: #334155;
		}

		.empty-state {
			text-align: center;
			padding: 3rem 1rem;
			color: #7f8ea3;
			font-style: italic;
		}

		/* 加载动画 */
		.loader {
			display: flex;
			justify-content: center;
			align-items: center;
			gap: 12px;
			padding: 2rem;
		}
		.spinner {
			width: 28px;
			height: 28px;
			border: 3px solid #3b4b6e;
			border-top: 3px solid #a855f7;
			border-radius: 50%;
			animation: spin 0.8s linear infinite;
		}
		@keyframes spin {
			0% { transform: rotate(0deg); }
			100% { transform: rotate(360deg); }
		}

		footer {
			margin-top: 3rem;
			text-align: center;
			font-size: 0.75rem;
			color: #4b556b;
			border-top: 1px solid #1f2a3a;
			padding-top: 2rem;
		}

		@media (max-width: 750px) {
			body { padding: 1.2rem; }
			.dashboard { grid-template-columns: 1fr; }
			.file-item { flex-direction: column; align-items: stretch; }
			.action-buttons { justify-content: flex-end; }
			.hero h1 { font-size: 1.8rem; }
			.card-header h2 { font-size: 1.3rem; }
		}
		::-webkit-scrollbar {
			width: 5px;
		}
		::-webkit-scrollbar-track {
			background: #0f172a;
			border-radius: 10px;
		}
		::-webkit-scrollbar-thumb {
			background: #5b6e9e;
			border-radius: 10px;
		}
	</style>
</head>
<body>

<div class="container">
	<div class="hero">
		<h1>应用中心 · 灵动资源站</h1>
		<p>📱 APK 下载 | 🌐 HTML 在线预览 </p>
	</div>

	<div class="refresh-bar">
		<button id="refreshBtn" class="refresh-btn">⟳ 刷新列表</button>
	</div>

	<div class="dashboard">
		<!-- APK 卡片区 -->
		<div class="card">
			<div class="card-header">
				<h2>📲 安卓应用 (APK) <span id="apkCount" class="badge-count">0</span></h2>
			</div>
			<div id="apkList" class="file-list">
				<div class="loader"><div class="spinner"></div> 加载APK文件中...</div>
			</div>
		</div>

		<!-- HTML 卡片区 -->
		<div class="card">
			<div class="card-header">
				<h2>🌍 网页演示 (HTML) <span id="htmlCount" class="badge-count">0</span></h2>
			</div>
			<div id="htmlList" class="file-list">
				<div class="loader"><div class="spinner"></div> 获取HTML文档中...</div>
			</div>
		</div>
		
		<!-- 在 HTML 卡片之后，添加视频卡片 -->
		<div class="card">
			<div class="card-header">
				<h2>🎬 视频资源 (MP4/MOV/WEBM) <span id="videoCount" class="badge-count">0</span></h2>
			</div>
			<div id="videoList" class="file-list">
				<div class="loader"><div class="spinner"></div> 加载视频列表中...</div>
			</div>
		</div>
		
		
	</div>
	<footer>
		⚡ 数据实时同步网站 · 点击“浏览”在线体验HTML项目 · APK点击下载即可安装
	</footer>
</div>

<script>
	// GitHub 仓库配置
	const REPO_OWNER = 'ningchaojie';
	const REPO_NAME = 'ningchaojie.github.io';
	const API_URL = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/`;
	const RAW_BASE = `https://${REPO_OWNER}.github.io/`;   // 用于直接访问文件

	// DOM 元素
	const apkContainer = document.getElementById('apkList');
	const htmlContainer = document.getElementById('htmlList');
	const apkCountSpan = document.getElementById('apkCount');
	const htmlCountSpan = document.getElementById('htmlCount');
	const refreshBtn = document.getElementById('refreshBtn');

	// 状态
	let isLoading = false;

	// 格式化文件大小
	function formatFileSize(bytes) {
		if (!bytes || bytes === 0) return '0 B';
		const k = 1024;
		const sizes = ['B', 'KB', 'MB', 'GB'];
		const i = Math.floor(Math.log(bytes) / Math.log(k));
		return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
	}

	// 显示错误提示（简洁版）
	function showError(container, message) {
		if (!container) return;
		container.innerHTML = `<div class="empty-state">⚠️ 加载失败: ${message}<br><span style="font-size:13px;">点击上方刷新按钮重试</span></div>`;
	}

	// 渲染APK列表
	function renderApk(files) {
		if (!files || files.length === 0) {
			apkContainer.innerHTML = `<div class="empty-state">📭 暂无APK文件上传<br>将 .apk 放入仓库根目录即可展示</div>`;
			apkCountSpan.innerText = '0';
			return;
		}
		apkCountSpan.innerText = files.length;
		apkContainer.innerHTML = '';
		files.forEach(file => {
			const downloadUrl = `${RAW_BASE}${encodeURIComponent(file.name)}`;
			const fileSize = formatFileSize(file.size);
			const item = document.createElement('div');
			item.className = 'file-item';
			item.innerHTML = `
				<div class="file-info">
					<div class="file-icon">📦</div>
					<div class="file-details">
						<div class="file-name">${escapeHtml(file.name)}</div>
						<div class="file-size">${fileSize}</div>
					</div>
				</div>
				<div class="action-buttons">
					<a href="${downloadUrl}" download class="btn btn-download" target="_blank">⬇️ 下载APK</a>
					<button class="btn btn-copy copy-link" data-url="${downloadUrl}">📋 复制链接</button>
				</div>
			`;
			apkContainer.appendChild(item);
		});
		// 绑定复制事件
		document.querySelectorAll('#apkList .copy-link').forEach(btn => {
			btn.addEventListener('click', (e) => {
				const url = btn.getAttribute('data-url');
				copyToClipboard(url, btn);
			});
		});
	}

	// 渲染HTML列表
	function renderHtml(files) {
		if (!files || files.length === 0) {
			htmlContainer.innerHTML = `<div class="empty-state">📄 未检测到 HTML 文件<br>可上传 .html 页面用于在线展示</div>`;
			htmlCountSpan.innerText = '0';
			return;
		}
		htmlCountSpan.innerText = files.length;
		htmlContainer.innerHTML = '';
		files.forEach(file => {
			const previewUrl = `${RAW_BASE}${encodeURIComponent(file.name)}`;
			const fileSize = formatFileSize(file.size);
			const item = document.createElement('div');
			item.className = 'file-item';
			item.innerHTML = `
				<div class="file-info">
					<div class="file-icon">🌐</div>
					<div class="file-details">
						<div class="file-name">${escapeHtml(file.name)}</div>
						<div class="file-size">${fileSize}</div>
					</div>
				</div>
				<div class="action-buttons">
					<a href="${previewUrl}" class="btn btn-view" target="_blank">🔍 新窗浏览</a>
					<button class="btn btn-copy copy-html" data-url="${previewUrl}">📋 复制链接</button>
				</div>
			`;
			htmlContainer.appendChild(item);
		});
		document.querySelectorAll('#htmlList .copy-html').forEach(btn => {
			btn.addEventListener('click', (e) => {
				const url = btn.getAttribute('data-url');
				copyToClipboard(url, btn);
			});
		});
	}
	
	function renderVideo(files) {
		const videoContainer = document.getElementById('videoList');
		const videoCountSpan = document.getElementById('videoCount');
		if (!files || files.length === 0) {
			videoContainer.innerHTML = `<div class="empty-state">🎥 暂无视频文件<br>将 .mp4 / .mov 等文件放入仓库根目录即可展示</div>`;
			videoCountSpan.innerText = '0';
			return;
		}
		videoCountSpan.innerText = files.length;
		videoContainer.innerHTML = '';
		files.forEach(file => {
			const previewUrl = `${RAW_BASE}${encodeURIComponent(file.name)}`;
			const downloadUrl = previewUrl;
			const fileSize = formatFileSize(file.size);
			const item = document.createElement('div');
			item.className = 'file-item';
			item.innerHTML = `
				<div class="file-info">
					<div class="file-icon">🎬</div>
					<div class="file-details">
						<div class="file-name">${escapeHtml(file.name)}</div>
						<div class="file-size">${fileSize}</div>
					</div>
				</div>
				<div class="action-buttons">
					<a href="${previewUrl}" class="btn btn-view" target="_blank">▶ 在线预览</a>
					<a href="${downloadUrl}" download class="btn btn-download" target="_blank">⬇️ 下载视频</a>
					<button class="btn btn-copy copy-video" data-url="${downloadUrl}">📋 复制链接</button>
				</div>
			`;
			videoContainer.appendChild(item);
		});
		// 绑定复制事件
		document.querySelectorAll('#videoList .copy-video').forEach(btn => {
			btn.addEventListener('click', (e) => {
				const url = btn.getAttribute('data-url');
				copyToClipboard(url, btn);
			});
		});
	}	
			
	

	// 复制到剪贴板辅助函数
	async function copyToClipboard(text, btnElement) {
		try {
			await navigator.clipboard.writeText(text);
			const originalText = btnElement.innerText;
			btnElement.innerText = '✅ 已复制';
			setTimeout(() => {
				btnElement.innerText = originalText;
			}, 1500);
		} catch (err) {
			alert('复制失败，可手动选择链接');
		}
	}

	// 简单防XSS
	function escapeHtml(str) {
		return str.replace(/[&<>]/g, function(m) {
			if (m === '&') return '&amp;';
			if (m === '<') return '&lt;';
			if (m === '>') return '&gt;';
			return m;
		}).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
			return c;
		});
	}

	// 核心：从 GitHub API 获取文件列表并分类
	async function fetchRepositoryFiles() {
		if (isLoading) return;
		isLoading = true;
		// 显示骨架加载状态
		apkContainer.innerHTML = `<div class="loader"><div class="spinner"></div> 正在读取仓库目录...</div>`;
		htmlContainer.innerHTML = `<div class="loader"><div class="spinner"></div> 正在读取仓库目录...</div>`;
		document.getElementById('videoList').innerHTML = `<div class="loader"><div class="spinner"></div> 正在加载视频列表...</div>`;
		
		try {
			const controller = new AbortController();
			const timeoutId = setTimeout(() => controller.abort(), 12000);
			const response = await fetch(API_URL, {
				headers: { 'Accept': 'application/vnd.github.v3+json' },
				signal: controller.signal
			});
			clearTimeout(timeoutId);
			
			if (!response.ok) {
				throw new Error(`HTTP ${response.status}: ${response.statusText}`);
			}
			
			const data = await response.json();
			if (!Array.isArray(data)) {
				throw new Error('API返回数据格式异常');
			}
			
			// 过滤出文件（type: file）并且是 .apk 或 .html 结尾
			const apkFiles = [];
			const htmlFiles = [];
			const videoFiles = [];
			
			for (const item of data) {
				if (item.type !== 'file') continue;
				const name = item.name;
				if (name.toLowerCase().endsWith('.apk')) {
					apkFiles.push({
						name: name,
						size: item.size,
						download_url: item.download_url,
						path: item.path
					});
				} 
				else if (name.toLowerCase().endsWith('.html') || name.toLowerCase().endsWith('.htm')) {
					htmlFiles.push({
						name: name,
						size: item.size,
						download_url: item.download_url,
						path: item.path
					});
				}
				
				
				// 添加视频文件扩展名列表
				const videoExtensions = ['.mp4', '.mov', '.webm', '.mkv', '.avi', '.flv', '.m4v'];
				const isVideo = videoExtensions.some(ext => name.toLowerCase().endsWith(ext));
				
				if (isVideo) {
					videoFiles.push({
						name: name,
						size: item.size,
						download_url: item.download_url,
						path: item.path
					});
				}
								
				
			}
			
			// 排序：按名称字母排序
			apkFiles.sort((a,b) => a.name.localeCompare(b.name));
			htmlFiles.sort((a,b) => a.name.localeCompare(b.name));
			
			renderApk(apkFiles);
			renderHtml(htmlFiles);
			renderVideo(videoFiles);
			
		} catch (error) {
			console.error('获取仓库文件失败:', error);
			let errorMsg = error.message;
			if (error.name === 'AbortError') errorMsg = '请求超时，请检查网络后重试';
			showError(apkContainer, errorMsg);
			showError(htmlContainer, errorMsg);
			apkCountSpan.innerText = '0';
			htmlCountSpan.innerText = '0';
		} finally {
			isLoading = false;
		}
	}
	
	
	

	
	

	// 初始化 & 绑定刷新
	refreshBtn.addEventListener('click', () => {
		fetchRepositoryFiles();
	});

	// 页面首次加载自动获取
	fetchRepositoryFiles();

	// 添加简单指引提示：如果API请求因为跨域或速率限制，显示友好引导
	// （实际上GitHub API支持CORS，但是速率限制每小时60次未认证请求，够用）
	// 额外在控制台给出友好提示
	console.log('应用中心已启动，可点击刷新按钮同步最新APK与HTML文件');
</script>
</body>
</html>
